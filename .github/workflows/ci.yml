name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          # Install only what the unit tests need — skip heavy ML deps
          # (torch, easyocr, transformers) that aren't loaded by the tests.
          pip install fastapi "uvicorn[standard]" python-multipart \
                      pydantic pydantic-settings "pydantic[email]" \
                      python-jose[cryptography] httpx \
                      supabase celery[redis] redis Pillow \
                      xgboost scikit-learn pandas numpy \
                      pytest pytest-asyncio

      - name: Run pytest
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test-anon-key
          SUPABASE_SERVICE_KEY: test-service-key
          JWT_SECRET: test-secret
        run: pytest tests/ -v

  frontend-build:
    name: Frontend build (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
